<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f7f4ed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Easy Piano">
  <title>Easy Piano</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.png?v=185" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon.png?v=185">
  <link rel="stylesheet" href="styles.css?v=185">
</head>
<body>
  <main class="app-shell">
    <section class="stage" aria-label="实时钢琴 MIDI 显示">
      <p id="statusText" class="status-banner">等待连接 MIDI 键盘</p>
      <div class="topbar">
        <div class="brand">
          <img class="brand-mark" src="icons/icon.png?v=185" alt="" aria-hidden="true">
          <div>
            <h1>Easy Piano</h1>
            <div class="status-row">
              <span id="versionBadge" class="version-badge">v185</span>
            </div>
          </div>
        </div>
        <div class="actions">
          <button id="connectButton" class="primary" type="button">连接 MIDI</button>
          <button id="recordButton" class="record-button" type="button">录 MIDI</button>
          <button id="stopRecordButton" class="ghost hidden" type="button">停止 MIDI</button>
          <button id="loadMidiButton" class="ghost" type="button">载入乐谱</button>
          <button id="exportPdfButton" class="ghost" type="button" disabled>导出PDF</button>
          <button id="fullscreenButton" class="ghost" type="button">全屏</button>
          <button id="refreshButton" class="ghost" type="button">更新</button>
          <button id="installButton" class="ghost hidden" type="button">安装</button>
          <input id="midiFileInput" class="file-input" type="file" accept=".mid,.midi,.musicxml,.xml,audio/midi,audio/x-midi,application/vnd.recordare.musicxml+xml,text/xml,application/xml">
        </div>
      </div>

      <details class="settings-panel">
        <summary><span id="settingsSummaryLabel">设置</span></summary>
        <div class="panel-strip" aria-label="连接设置">
          <div class="control-row">
            <div class="field language-field">
              <span id="languageLabel">语言</span>
              <div class="segmented" role="group" aria-label="语言">
                <button class="mode-option active" type="button" data-language="zh" aria-pressed="true">中文</button>
                <button class="mode-option" type="button" data-language="ja" aria-pressed="false">日本語</button>
                <button class="mode-option" type="button" data-language="en" aria-pressed="false">EN</button>
              </div>
            </div>
            <label class="field input-field hidden">
              <span>MIDI 输入</span>
              <select id="inputSelect">
                <option value="">自动选择</option>
              </select>
            </label>
            <div class="field mode-field">
              <span>音符标记</span>
              <div class="segmented" role="group" aria-label="音符标记">
                <button class="mode-option active" type="button" data-label-mode="degree" aria-pressed="true">级数</button>
                <button class="mode-option" type="button" data-label-mode="pitch" aria-pressed="false">音高</button>
                <button class="mode-option" type="button" data-label-mode="none" aria-pressed="false">无</button>
              </div>
            </div>
            <div class="field pedal-field">
              <span>左踏板翻页</span>
              <div class="segmented" role="group" aria-label="左踏板翻页">
                <button class="mode-option active" type="button" data-pedal-step="on" aria-pressed="true">开</button>
                <button class="mode-option" type="button" data-pedal-step="off" aria-pressed="false">关</button>
              </div>
            </div>
            <div class="field sustain-page-field hidden">
              <span>延音踏板翻页</span>
              <div class="segmented" role="group" aria-label="延音踏板翻页">
                <button class="mode-option active" type="button" data-sustain-pedal-page="off" aria-pressed="true">关</button>
                <button class="mode-option" type="button" data-sustain-pedal-page="half" aria-pressed="false">半页</button>
                <button class="mode-option" type="button" data-sustain-pedal-page="page" aria-pressed="false">一页</button>
              </div>
            </div>
            <div class="field auto-follow-field">
              <span>自动跟随</span>
              <div class="segmented two-part" role="group" aria-label="自动跟随">
                <button class="mode-option active" type="button" data-auto-follow-mode="off" aria-pressed="true">关</button>
                <button class="mode-option" type="button" data-auto-follow-mode="beat" aria-pressed="false">按格</button>
              </div>
            </div>
            <div class="field tolerance-field">
              <span>容错 <strong id="toleranceValue">50%</strong></span>
              <div class="slider-control">
                <input id="toleranceSlider" type="range" min="0" max="50" step="10" value="50" aria-label="容错百分比">
              </div>
            </div>
            <div class="field time-field">
              <span>拍号</span>
              <div class="segmented" role="group" aria-label="拍号">
                <button class="mode-option active" type="button" data-time-signature="4/4" aria-pressed="true">4/4</button>
                <button class="mode-option" type="button" data-time-signature="3/4" aria-pressed="false">3/4</button>
                <button class="mode-option" type="button" data-time-signature="6/8" aria-pressed="false">6/8</button>
              </div>
            </div>
            <label class="field playback-instrument-field">
              <span id="playbackInstrumentLabel">音色</span>
              <select id="playbackInstrumentSelect" class="playback-instrument-select" aria-label="播放音色"></select>
            </label>
            <div class="field live-sound-field">
              <span id="liveSoundFieldLabel">发声</span>
              <label class="live-sound-toggle">
                <input id="liveSoundToggle" type="checkbox">
                <span id="liveSoundToggleLabel">弹奏时设备发声</span>
              </label>
            </div>
          </div>
          <div class="field key-field">
            <span>调号</span>
            <div class="key-options" role="group" aria-label="调号">
              <button class="key-option active" type="button" data-key-signature="C" aria-pressed="true">C</button>
              <button class="key-option" type="button" data-key-signature="Db" aria-pressed="false">Db</button>
              <button class="key-option" type="button" data-key-signature="D" aria-pressed="false">D</button>
              <button class="key-option" type="button" data-key-signature="Eb" aria-pressed="false">Eb</button>
              <button class="key-option" type="button" data-key-signature="E" aria-pressed="false">E</button>
              <button class="key-option" type="button" data-key-signature="F" aria-pressed="false">F</button>
              <button class="key-option" type="button" data-key-signature="Gb" aria-pressed="false">Gb</button>
              <button class="key-option" type="button" data-key-signature="G" aria-pressed="false">G</button>
              <button class="key-option" type="button" data-key-signature="Ab" aria-pressed="false">Ab</button>
              <button class="key-option" type="button" data-key-signature="A" aria-pressed="false">A</button>
              <button class="key-option" type="button" data-key-signature="Bb" aria-pressed="false">Bb</button>
              <button class="key-option" type="button" data-key-signature="B" aria-pressed="false">B</button>
            </div>
          </div>
        </div>
      </details>

      <section class="mistake-log" aria-live="polite">
        <div id="mistakeLogTitle" class="mistake-log-title">弹错记录</div>
        <div id="mistakeLogList" class="mistake-log-list">
          <span id="mistakeLogEmpty" class="mistake-log-empty">暂无</span>
        </div>
      </section>

      <section class="score-board" aria-label="五线谱">
        <div class="measure-tools" aria-label="小节控制">
          <div class="playback-scrubber">
            <input id="playbackSlider" type="range" min="0" max="0" step="1" value="0" aria-label="乐谱位置">
            <span id="playbackTime" class="playback-time">0:00 / 0:00</span>
          </div>
            <div class="measure-actions">
            <button id="startMeasureButton" class="measure-play icon-button" type="button" aria-label="开头" title="开头" disabled><span class="control-icon stop-icon" aria-hidden="true"></span></button>
            <button id="playMeasureButton" class="measure-play icon-button" type="button" aria-label="播放" title="播放" disabled><span class="control-icon play-icon" aria-hidden="true"></span></button>
            <label class="silent-playback-toggle">
              <input id="silentPlaybackToggle" type="checkbox">
              <span id="silentPlaybackToggleLabel">无声播放</span>
            </label>
            <div class="tempo-control" aria-label="速度">
              <button id="tempoDownButton" class="tempo-step" type="button" aria-label="放慢" title="放慢" disabled>-</button>
              <span id="tempoValue">120</span>
              <button id="tempoUpButton" class="tempo-step" type="button" aria-label="加快" title="加快" disabled>+</button>
            </div>
            <span id="measureStatus" class="measure-status hidden">实时显示</span>
            <span id="currentChord" class="chord-status">-</span>
          </div>
        </div>
        <svg id="staffSvg" viewBox="0 0 1760 900" role="img" aria-labelledby="staffTitle">
          <title id="staffTitle">实时显示弹下的音符</title>
        </svg>
      </section>

      <section class="keyboard-board" aria-label="屏幕钢琴键盘">
        <div id="keyboard" class="keyboard"></div>
      </section>
    </section>
  </main>
  <div id="pdfExportRoot" class="pdf-export-root" aria-hidden="true"></div>
  <script src="app.js?v=185"></script>
</body>
</html>
